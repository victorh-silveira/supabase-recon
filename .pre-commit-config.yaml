minimum_pre_commit_version: "3.5.0"

default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        name: Segurança — Gitleaks (tokens e segredos)

  - repo: local
    hooks:
      - id: clean-workspace-lint
        name: Qualidade — lint/docs com auto-fix local (clean_workspace)
        entry: python scripts/operations/clean_workspace.py --stage lint --fix-lint
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: clean-workspace-pytest
        name: Testes — pytest completo (clean_workspace)
        entry: python scripts/operations/clean_workspace.py --stage pytest
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: clean-workspace-test
        name: Testes — coverage 100% (clean_workspace)
        entry: python scripts/operations/clean_workspace.py --stage test --coverage-fail-under 100
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: clean-workspace-security
        name: Segurança — bandit e pip-audit (clean_workspace)
        entry: python scripts/operations/clean_workspace.py --stage security
        language: system
        pass_filenames: false
        stages: [pre-commit]

      - id: commitlint
        name: Mensagem de commit — Commitlint (Conventional Commits)
        entry: npx --yes -p @commitlint/cli -p @commitlint/config-conventional commitlint --config tools/commitlint.config.mjs --edit
        language: system
        stages: [commit-msg]
