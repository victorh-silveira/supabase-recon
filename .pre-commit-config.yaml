minimum_pre_commit_version: "3.5.0"

default_language_version:
  python: python3.14

repos:
  - repo: local
    hooks:
      - id: lint
        name: Qualidade & Documentação — Lint
        entry: python scripts/operations/clean_workspace.py --stage lint
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      - id: test
        name: Testes — Unitários & Cobertura (100%)
        entry: python scripts/operations/clean_workspace.py --stage test
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

      - id: security
        name: Segurança — Auditoria & Vulnerabilidades
        entry: python scripts/operations/clean_workspace.py --stage security
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]

      - id: commitlint
        name: Mensagem — Commitlint (Conventional Commits)
        entry: npx --yes -p @commitlint/cli -p @commitlint/config-conventional commitlint --config tools/commitlint.config.mjs --edit
        language: system
        stages: [commit-msg]

      - id: cleanup
        name: Limpeza — Remover lixo e caches
        entry: python scripts/operations/clean_workspace.py --stage clean
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]