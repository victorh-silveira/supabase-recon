name: Release semântico
description: semantic-release — versão, CHANGELOG e GitHub Release

inputs:
  github_token:
    description: Token do GitHub (GITHUB_TOKEN)
    required: true

runs:
  using: composite

  steps:
    - name: Configurar Node.js 24
      uses: actions/setup-node@v4
      with:
        node-version: "24"

    - name: Instalar pacotes do semantic-release
      shell: bash
      run: |
        npm install --no-save \
          semantic-release \
          @semantic-release/commit-analyzer \
          @semantic-release/release-notes-generator \
          @semantic-release/changelog \
          @semantic-release/git \
          @semantic-release/exec \
          @semantic-release/github \
          conventional-changelog-conventionalcommits

    - name: Executar semantic-release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        npx --no-install semantic-release --extends ./tools/releaserc.json
