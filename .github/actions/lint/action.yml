name: Lint Python
description: Python 3.14.3 — isort, ruff (check + format) e interrogate

runs:
  using: composite

  steps:
    - name: Configurar Python 3.14.3
      uses: actions/setup-python@v5
      with:
        python-version: "3.14.3"
        cache: pip

    - name: Instalar isort, ruff e interrogate
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install ruff isort interrogate

    - name: Isort (apenas verificação)
      shell: bash
      run: isort --check-only .

    - name: Ruff — lint
      shell: bash
      run: ruff check .

    - name: Ruff — formato
      shell: bash
      run: ruff format --check .

    - name: Interrogate — cobertura de docstrings
      shell: bash
      run: interrogate -v --fail-under 100 .
