name: Lint Python
description: Python 3.12 — verificação isort e ruff (check + format; docstrings via regras D)

runs:
  using: composite

  steps:
    - name: Configurar Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip

    - name: Instalar isort e ruff
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install ruff isort

    - name: Isort (apenas verificação)
      shell: bash
      run: isort --check-only .

    - name: Ruff — lint
      shell: bash
      run: ruff check .

    - name: Ruff — formato
      shell: bash
      run: ruff format --check .
