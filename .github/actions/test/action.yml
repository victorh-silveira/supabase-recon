name: Testes Pytest
description: Python 3.14.3 (.python-version) — pytest completo + coverage 100%

runs:
  using: composite

  steps:
    - name: Configurar Python (.python-version)
      uses: actions/setup-python@v5
      with:
        python-version-file: .python-version
        cache: pip

    - name: Instalar dependências (runtime e dev)
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt

    - name: Executar suíte de testes e cobertura (100%)
      shell: bash
      run: python scripts/operations/clean_workspace.py --stage test --coverage-fail-under 100
