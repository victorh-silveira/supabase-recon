name: Segurança do código
description: Python 3.14.3 (.python-version) — clean_workspace stage=security + Gitleaks

runs:
  using: composite

  steps:
    - name: Configurar Python (.python-version)
      uses: actions/setup-python@v5
      with:
        python-version-file: .python-version
        cache: pip

    - name: Instalar ferramentas e dependências do projeto
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt -r requirements-dev.txt
        GITLEAKS_VERSION="8.24.2"
        curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o /tmp/gitleaks.tar.gz
        tar -xzf /tmp/gitleaks.tar.gz -C /tmp
        sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
        gitleaks version

    - name: Clean workspace — segurança
      shell: bash
      run: python scripts/operations/clean_workspace.py --stage security

    - name: Gitleaks — vazamento de segredos no repositório
      shell: bash
      run: gitleaks detect --source . --verbose --redact
