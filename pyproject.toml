[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
sections = ['FUTURE', 'STDLIB', 'THIRDPARTY', 'FIRSTPARTY', 'LOCALFOLDER']
skip = [".venv", "venv", "output"]

[tool.ruff]
line-length = 120
target-version = "py314"
exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    "venv",
    "output",
    "__pycache__",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "N",
    "D",
    "S",
    "BLE",
    "FBT",
    "A",
    "COM",
    "T20",
    "Q",
    "RET",
    "SIM",
    "ARG",
    "PTH",
    "ERA",
    "PL",
]
ignore = [
    "E501",
    "D203",
    "D213",
    "ANN204",
    "S101",
    "PLR0913",
    "PLR2004",
    "COM812",
    "ISC001",
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"run.py" = ["T20", "PLC0415"]
"src/recon/infrastructure/http_urllib.py" = ["S310"]
"src/recon/infrastructure/probe_client.py" = ["S310", "PLC0415"]
"src/recon/presentation/cli.py" = ["T20"]
"src/recon/presentation/human_report.py" = ["T20"]
"scripts/operations/*.py" = ["T20", "S603"]
"tests/**/*.py" = ["PLR2004", "ARG005"]
"tests/conftest.py" = ["PLR2004", "ARG001", "E402", "I001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q --strict-markers"
markers = [
    "unit: testes unitarios (sem rede)",
    "integration: testes com I/O externo",
]

[tool.interrogate]
ignore-init-method = true
ignore-init-module = true
ignore-private = true
fail-under = 100
exclude = ["tests", ".venv", "venv", "build", "dist", ".git", "output"]

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", ".git", "output"]
skips = ["B310"]
