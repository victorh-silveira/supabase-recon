[tool.isort]
profile = "black"
line_length = 120
multi_line_output = 3
include_trailing_comma = true
force_grid_wrap = 0
use_parentheses = true
ensure_newline_before_comments = true
sections = ['FUTURE', 'STDLIB', 'THIRDPARTY', 'FIRSTPARTY', 'LOCALFOLDER']
skip = [".venv", "venv", "output"]

[tool.ruff]
line-length = 120
target-version = "py314"
exclude = [
    ".git",
    ".ruff_cache",
    ".venv",
    "venv",
    "output",
    "__pycache__",
    "build",
    "dist",
]

[tool.ruff.lint]
select = [
    "E",    # erros de estilo (pycodestyle)
    "W",    # avisos de estilo (pycodestyle)
    "F",    # pyflakes
    "I",    # isort
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "UP",   # pyupgrade
    "N",    # pep8-naming
    "D",    # pydocstyle
    "S",    # flake8-bandit (segurança)
    "BLE",  # flake8-blind-except
    "FBT",  # flake8-boolean-trap
    "A",    # flake8-builtins
    "COM",  # flake8-commas
    "T20",  # flake8-print
    "Q",    # flake8-quotes
    "RET",  # flake8-return
    "SIM",  # flake8-simplify
    "ARG",  # flake8-unused-arguments
    "PTH",  # flake8-use-pathlib
    "ERA",  # eradicate (codigo comentado)
    "PL",   # pylint
]
ignore = [
    "E501",     # linha longa (formatador controla)
    "D203",     # linha em branco antes de docstring de classe
    "D213",     # resumo da docstring multi-linha na segunda linha
    "ANN204",   # sem anotacao de retorno em __init__
    "S101",     # uso de assert (aceito em checagens internas)
    "PLR0913",  # muitos argumentos na definicao da funcao
    "PLR2004",  # valor magico usado em comparacao
    "COM812",   # virgula final ausente (conflita com ruff format)
    "ISC001",   # concatenacao implicita de string (conflita com ruff format)
]

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"run.py" = ["T20", "PLC0415"]
"src/recon/infrastructure/http_urllib.py" = ["S310"]
"src/recon/infrastructure/probe_client.py" = ["S310", "PLC0415"]
"src/recon/presentation/cli.py" = ["T20"]
"src/recon/presentation/human_report.py" = ["T20"]
"scripts/operations/*.py" = ["T20", "S603"]
"tests/**/*.py" = ["PLR2004", "ARG005"]
"tests/conftest.py" = ["PLR2004", "ARG001", "E402", "I001"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-q --strict-markers"
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
markers = [
    "unit: testes unitarios isolados (sem I/O externo)",
    "application: testes da camada application (tests/unit/application/)",
    "domain: testes da camada domain (tests/unit/domain/)",
    "infrastructure: testes da camada infrastructure (tests/unit/infrastructure/)",
    "presentation: testes da camada presentation (tests/unit/presentation/)",
]

[tool.interrogate]
ignore-init-method = true
ignore-init-module = true
ignore-private = true
fail-under = 100
exclude = ["tests", ".venv", "venv", "build", "dist", ".git", "output"]

[tool.bandit]
exclude_dirs = ["tests", ".venv", "venv", ".git", "output"]
skips = ["B310"]
